conditionGroups:
  - id: obraz-prawidlowy
    label: Obraz prawidłowy
    description: Szablony opisów prawidłowych dla różnych narządów i badań.
    organs: [Wątroba, Pęcherzyk żółciowy, Nerki, Trzustka, Tarczyca, Węzły chłonne]
    pathology: [Obraz prawidłowy]
    order: 10
  - id: zmiany-torbielowate
    label: Zmiany torbielowate
    description: Zmiany torbielowate i torbiele wymagające różnicowania między badaniami.
    organs: [Wątroba, Nerki, Trzustka, Tarczyca]
    pathology:
      [Torbiel, Torbiel prosta, Torbiel złożona, Torbiel rzekoma, Torbiel Bosniak I, Torbiel Bosniak II, Torbiel Bosniak IIF, Torbiel Bosniak III-IV, IPMN]
    order: 20
  - id: zmiany-lite-guzowe
    label: Zmiany lite i guzowe
    description: Guzy lite, łagodne i złośliwe zmiany ogniskowe.
    organs: [Wątroba, Nerki, Trzustka, Tarczyca, Tkanka podskórna]
    pathology:
      [Naczyniak, FNH, Gruczolak, HCC, Przerzuty, Guz nerki, Angiomyolipoma, Guz neuroendokrynny, Gruczolakorak, Guzek, Guzek łagodny, Tłuszczak]
    order: 30
  - id: zapalne
    label: Zmiany zapalne
    description: Ostre i przewlekłe zmiany zapalne w różnych narządach.
    organs: [Wątroba, Pęcherzyk żółciowy, Nerki, Trzustka, Tarczyca, Węzły chłonne, Tkanka podskórna]
    pathology: [Zapalenie, Przewlekłe zapalenie, Odmiedniczkowe zapalenie, Hashimoto, Graves-Basedow, Odczynowe, Gruźlicze, Ropień]
    order: 40
  - id: kamica-i-zastoj
    label: Kamica i zastój
    description: Kamica, zastój i wtórne poszerzenia układu zbiorczego lub dróg żółciowych.
    organs: [Pęcherzyk żółciowy, Nerki, Wątroba]
    pathology: [Kamica, Złóg zaklinowany w szyi, Błoto żółciowe, Wodonercze, Poszerzenie dróg żółciowych]
    order: 50
  - id: zmiany-przerzutowe
    label: Zmiany przerzutowe i podejrzane
    description: Zmiany o wysokim ryzyku onkologicznym lub przerzutowym.
    organs: [Wątroba, Węzły chłonne]
    pathology: [Przerzuty, Przerzutowe, Podejrzane, Martwicze, Chłoniak]
    order: 60
