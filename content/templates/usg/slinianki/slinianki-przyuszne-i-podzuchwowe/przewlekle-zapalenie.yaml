sections:
  assessmentChecklist:
    - Zajęta ślinianka, porównanie wielkości i echostruktury ze stroną przeciwną.
    - Niejednorodność miąższu, cechy włóknienia i zachowanie architektury.
    - Przewody, przewężenia, poszerzenia i ewentualne złogi.
    - Unaczynienie w Dopplerze oraz zmiany ogniskowe wymagające różnicowania.
    - Węzły okołogruczołowe i korelacja z objawami nawrotowymi.
  reportTemplate: |
    Ślinianka {{przyuszna_lub_podzuchwowa}} {{strona}} o {{zmniejszonej_lub_prawidlowej}} wielkości, z niejednorodnym, miejscami hipoechogenicznym miąższem o {{zachowanej_lub_zatartej}} architekturze. Przewód wyprowadzający {{opis_poszerzenia_lub_przewezenia}}, bez {{lub_z}} widocznego złogu. W Dopplerze {{opis_unaczynienia}}. Bez kolekcji płynowych.
  impressionTemplate: |
    Obraz USG może odpowiadać przewlekłemu zapaleniu ślinianki {{przyusznej_lub_podzuchwowej}} {{strona}}.
  clinicalNotes:
    - Obraz USG przewlekłego zapalenia może być nieswoisty; przy zmianie ogniskowej lub atypii konieczna jest dalsza diagnostyka zależna od pełnego obrazu klinicznego.
