sections:
  assessmentChecklist:
    - Obie ślinianki przyuszne i podżuchwowe oraz ich symetria.
    - Jednorodność miąższu, hipoechogeniczne obszary i zatarcie granic.
    - Zmiany ogniskowe, zwapnienia, przewody i węzły wewnątrz- oraz okołogruczołowe.
    - Doppler i porównanie z badaniami wcześniejszymi, jeśli dostępne.
    - Korelacja z objawami suchości i rozpoznaniem klinicznym.
  reportTemplate: |
    Obie ślinianki przyuszne i podżuchwowe o {{prawidlowej_lub_zmienionej}} wielkości, z niejednorodnym miąższem i {{liczne_lub_pojedyncze}} hipoechogenicznymi obszarami o wymiarach do {{wymiar_mm}} mm. {{Opis_granic_przewodow_zwapnien_i_wezlow}}. W Dopplerze {{opis_unaczynienia}}. Obraz w odpowiedniej korelacji klinicznej może odpowiadać zmianom w przebiegu zespołu Sjogrena.
  impressionTemplate: |
    Niejednorodny obraz USG ślinianek, mogący odpowiadać zmianom w przebiegu zespołu Sjogrena.
  clinicalNotes:
    - USG nie zastępuje kryteriów klinicznych, serologicznych ani histopatologicznych rozpoznania zespołu Sjogrena.
