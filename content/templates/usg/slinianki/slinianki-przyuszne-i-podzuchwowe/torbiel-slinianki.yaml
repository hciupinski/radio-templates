sections:
  assessmentChecklist:
    - Lokalizacja zmiany względem miąższu ślinianki i przewodu wyprowadzającego.
    - Trzy wymiary, zawartość, ściana, przegrody i wzmocnienie za tylną ścianą.
    - Komponent lity i unaczynienie ściany lub elementów wewnętrznych w Dopplerze.
    - Cechy zapalenia, sialocele lub ropnia oraz porównanie z badaniami wcześniejszymi.
  reportTemplate: |
    W obrębie {{slinianki_lub_okolicy}}, widoczna zmiana torbielowata o wymiarach {{wymiary_mm}} mm, o {{opis_zawartosci}}, z {{cienka_lub_pogrubiala}} ścianą i {{brak_lub_opis_przegrod}}. W Dopplerze {{opis_unaczynienia_sciany_i_elementow_wewnetrznych}}. {{Brak_lub_opis_komponentu_litego_i_cech_zapalnych}}.
  impressionTemplate: |
    Zmiana torbielowata w obrębie {{slinianki_lub_okolicy}}. {{Opis_stopnia_typowosci_i_dalszej_oceny}}.
  followUp:
    - Zmiana z pogrubiałą ścianą, komponentem litym lub unaczynieniem wymaga dalszej charakterystyki zgodnej z pełnym obrazem klinicznym.
