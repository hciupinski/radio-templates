sections:
  assessmentChecklist:
    - Zajęta ślinianka, wielkość, bolesność zgłaszana w miejscu badania i porównanie ze stroną przeciwną.
    - Echostruktura miąższu, obrzęk i unaczynienie w Dopplerze.
    - Przewód wyprowadzający, złóg lub inna przyczyna obturacji.
    - Kolekcja płynowa lub ropień oraz szerzenie do tkanek sąsiednich.
    - Węzły wewnątrz- i okołogruczołowe.
  reportTemplate: |
    Ślinianka {{przyuszna_lub_podzuchwowa}} {{strona}} powiększona, o niejednorodnej, obniżonej echogeniczności miąższu. W Dopplerze wzmożone unaczynienie. Przewód wyprowadzający {{opis_przewodu_i_ewentualnego_zlogu}}. {{brak_lub_opis_kolekcji_ropnej}}. {{opis_wezlow_okologruczolowych}}.
  impressionTemplate: |
    Obraz USG odpowiada ostremu zapaleniu ślinianki {{przyusznej_lub_podzuchwowej}} {{strona}}. {{brak_lub_podejrzenie_ropnia_lub_obturacji}}.
  followUp:
    - Przy kolekcji, cechach obturacji lub nasilonych objawach ogólnych wskazana pilna korelacja kliniczna i dalsze postępowanie specjalistyczne.
