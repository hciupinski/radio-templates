    W śliniance {{przyusznej_lub_podzuchwowej}} {{strona}} uwidoczniono hiperechogeniczny złóg o wymiarach {{wymiary_mm}} mm, położony {{lokalizacja_w_miazszu_lub_przewodzie}}, z {{obecnym_lub_nieobecnym}} cieniem akustycznym. Przewód wyprowadzający {{poszerzony_lub_nieposzerzony}} do {{srednica_mm}} mm. Miąższ ślinianki {{opis_miazszu_i_dopplera}}. {{brak_lub_opis_ropnia}}.
