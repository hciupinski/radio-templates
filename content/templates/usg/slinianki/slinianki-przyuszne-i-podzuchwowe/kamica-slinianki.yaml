sections:
  assessmentChecklist:
    - Strona, zajęta ślinianka i dokładna lokalizacja złogu w miąższu lub przewodzie.
    - Liczba i trzy wymiary złogów oraz cień akustyczny.
    - Poszerzenie przewodu przed przeszkodą i obraz miąższu ślinianki.
    - Cechy zapalenia, ropnia oraz porównanie ze stroną przeciwną.
    - Zasięg widocznego przewodu i ograniczenia oceny dystalnego odcinka.
