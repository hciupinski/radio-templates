sections:
  assessmentChecklist:
    - Zawartość worka przepuklinowego i łączność z kanałem pachwinowym.
    - Odprowadzalność, zmiana podczas próby Valsalvy i ucisk na jądro.
    - Przepływ w zawartości jelitowej lub sieci, jeśli jest ocenialny.
    - Wolny płyn i cechy uwięźnięcia.
  reportTemplate: |
    W mosznie {{strona}} widoczne wpuklanie {{jelit_lub_sieci_lub_plynu}} przez kanał pachwinowy, nasilające się podczas {{valsava_lub_pionizacji}}. Zawartość {{odprowadzalna_lub_nieodprowadzalna}}, {{bez_lub_z}} cechami zaburzeń ukrwienia w dostępnym zakresie. Jądro {{strona}} {{bez_lub_z}} uciskiem przez przepuklinę.
  impressionTemplate: |
    Przepuklina pachwinowo-mosznowa {{strona}}. {{Brak_lub_podejrzenie}} cech uwięźnięcia.
  followUp:
    - Przy nieodprowadzalnej przepuklinie, bólu lub podejrzeniu zaburzeń ukrwienia zalecić pilną konsultację chirurgiczną.
