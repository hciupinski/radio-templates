sections:
  assessmentChecklist:
    - Strona i rozmieszczenie drobnych niecieniujących ognisk echogenicznych.
    - Obecność zmiany ogniskowej, zanik jądra i obraz jądra przeciwległego.
    - Udokumentowane czynniki ryzyka nowotworu jądra, jeśli podane w skierowaniu.
  reportTemplate: |
    W jądrze {{strona_lub_obustronnie}} widoczne liczne drobne, niecieniujące ogniska echogeniczne, bez towarzyszącej zmiany ogniskowej. Objętość jąder {{prawidlowa_lub_opis}}. Jądro przeciwległe {{bez_lub_z}} mikrolitiazą.
  impressionTemplate: |
    Mikrolitiaza jądra {{strona_lub_obustronnie}}, bez zmiany ogniskowej.
  followUp:
    - Izolowana mikrolitiaza bez czynników ryzyka nie stanowi samodzielnego wskazania do rutynowych kontroli USG.
    - Przy czynnikach ryzyka lub współistniejącej zmianie ogniskowej konieczna jest kwalifikacja urologiczna.
