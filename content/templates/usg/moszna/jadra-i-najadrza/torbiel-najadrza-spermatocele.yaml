  assessmentChecklist:
    - Lokalizacja w głowie, trzonie lub ogonie najądrza.
    - Wymiary, zawartość, przegródki i przepływ w Dopplerze.
    - Ocena obu jąder pod kątem współistniejącej zmiany ogniskowej.
  reportTemplate: |
    W obrębie {{czesc_najadrza}} najądrza {{strona}} widoczna dobrze odgraniczona zmiana torbielowata o wymiarach {{wymiary_mm}} mm, {{bezechowa_lub_z_echami_wewnetrznymi}}, bez przepływu wewnętrznego. Jądro po tej stronie bez zmian ogniskowych.
