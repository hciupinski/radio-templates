sections:
  assessmentChecklist:
    - Wielkość i echogeniczność najądrza.
    - Wzmożenie perfuzji w Dopplerze oraz porównanie z drugą stroną.
    - Zajęcie jądra, reaktywny wodniak i pogrubienie skóry moszny.
    - Wykluczenie cech skrętu jądra w aktualnym badaniu.
  reportTemplate: |
    Najądrze {{strona}} powiększone, o {{obnizonej_lub_niejednorodnej}} echogeniczności, z wyraźnie wzmożonym unaczynieniem w Dopplerze. Jądro po stronie zmiany {{bez_lub_z}} współistniejącymi cechami zapalenia. {{Brak_lub_obecnosc}} reaktywnego wodniaka. Przepływ w jądrze zachowany.
  impressionTemplate: |
    Obraz USG przemawia za ostrym zapaleniem najądrza {{strona}}.
  differential:
    - Zapalenie najądrza i jądra.
    - Skręt jądra przy niejednoznacznym lub zmniejszonym przepływie.
