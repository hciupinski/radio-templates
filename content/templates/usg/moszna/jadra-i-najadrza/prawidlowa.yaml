sections:
  assessmentChecklist:
    - Położenie, wymiary i echostruktura obu jąder.
    - Obecność zmian ogniskowych i mikrozwapnień.
    - Głowa, trzon i ogon najądrza.
    - Porównawcza perfuzja jąder i najądrzy w Dopplerze.
    - Płyn w osłonkach, żylaki powrózka i przepuklina w dostępnym zakresie.
  reportTemplate: |
    Jądro prawe o wymiarach {{prawe_wymiary_mm}} mm, jądro lewe {{lewe_wymiary_mm}} mm, o jednorodnej echostrukturze, bez zmian ogniskowych. Najądrza niepowiększone, bez zmian ogniskowych. Przepływ naczyniowy w obu jądrach i najądrzach symetryczny. Bez płynu w osłonkach i bez żylaków powrózka nasiennego w dostępnym zakresie.
  impressionTemplate: |
    Obraz USG jąder i najądrzy w granicach normy.
