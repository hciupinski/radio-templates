sections:
  assessmentChecklist:
    - Lokalizacja w skórze lub na granicy skóry i tkanki podskórnej.
    - Trzy wymiary, kształt, zarys i echogeniczność zmiany.
    - "Cechy zawartości keratynowej: echa wewnętrzne, linijne refleksy lub struktura pseudojądra."
    - Wzmocnienie za tylną ścianą i hipoechogeniczna obwódka.
    - Łączność ze skórą, w tym objaw submarine sign, jeśli jest obecny.
    - Przepływ wewnętrzny i obwodowy oraz cechy pęknięcia lub zapalenia.
  reportTemplate: |
    W skórze lub na granicy skóry i tkanki podskórnej okolicy {{lokalizacja}} widoczna dobrze odgraniczona, owalna zmiana o wymiarach {{wymiary_mm}} mm, o {{jednorodnej_lub_niejednorodnej}} echostrukturze z {{echami_wewnetrznymi_lub_linijnymi_refleksami}}, z {{obecnym_lub_brakiem}} wzmocnienia za tylną ścianą. Widoczne {{polaczenie_lub_brak_jednoznacznego_polaczenia}} ze skórą. Bez przepływu wewnętrznego w badaniu Doppler; {{brak_lub_obecnosc}} cech zapalenia tkanek otaczających.
  impressionTemplate: |
    Obraz USG najbardziej odpowiada torbieli naskórkowej.
  clinicalNotes:
    - Obraz może być mniej typowy przy pęknięciu lub zapaleniu; wtedy granice i unaczynienie obwodowe mogą się zmieniać.
  differential:
    - Kaszak lub torbiel włosowa.
    - Ropień przy współistniejących cechach zapalnych.
    - Inna powierzchowna zmiana skórna lub podskórna.
  followUp:
    - Przy atypowej morfologii lub cechach zapalenia dalsze postępowanie ustalić w korelacji klinicznej.
