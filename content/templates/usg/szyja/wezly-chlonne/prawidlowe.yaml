sections:
  assessmentChecklist:
    - Lokalizacja i poziom szyi.
    - Liczba ocenianych węzłów.
    - Wymiary w osi długiej i krótkiej.
    - Owalny kształt i zachowana echogeniczna wnęka.
    - Jednorodność kory i brak cech martwicy lub zwapnień.
    - Brak patologicznego unaczynienia obwodowego.
  reportTemplate: |
    W dostępnym badaniu uwidoczniono węzły chłonne szyi o prawidłowej morfologii, owalnym kształcie, z zachowaną echogeniczną wnęką tłuszczową i jednorodną korą, do {{wymiary_mm}} mm w osi krótkiej. Bez cech martwicy, zwapnień ani patologicznego unaczynienia obwodowego.
  impressionTemplate: |
    Obraz ocenianych węzłów chłonnych szyi w granicach normy sonograficznej.
  clinicalNotes:
    - W badaniach kontrolnych lub onkologicznych warto podawać poziom szyi oraz największy wymiar osi krótkiej.
    - Zachowana echogeniczna wnęka i owalny kształt przemawiają za łagodnym charakterem węzła.
