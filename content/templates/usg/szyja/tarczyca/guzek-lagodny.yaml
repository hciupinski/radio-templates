sections:
  assessmentChecklist:
    - Lokalizacja i liczba guzków.
    - Trzy wymiary największej lub opisywanej zmiany.
    - "Skład: torbielowaty, spongiformny, mieszany lub lity."
    - Echogeniczność.
    - Kształt i granice.
    - Ogniska echogeniczne, w tym artefakt comet-tail.
    - Kategoria ACR TI-RADS i próg kontroli lub BAC.
  reportTemplate: |
    W {{lokalizacja}} uwidoczniono {{pojedynczy_lub_najwiekszy}} guzek o wymiarach {{wymiary_mm}} mm, {{sklad}}, {{echogenicznosc}}, {{szerszy_niz_wyzszy}}, o {{gladkie_lub_dobrze_odgraniczone}} granicach, {{z_lub_bez}} artefaktów comet-tail. Obraz odpowiada łagodnie wyglądającemu guzkowi tarczycy. Klasyfikacja ACR TI-RADS: {{tr2_lub_tr3}}.
  impressionTemplate: |
    Łagodnie wyglądający guzek tarczycy {{tr2_lub_tr3}} bez cech wysokiego ryzyka w USG. {{zalecenie_kontrola_lub_brak_bac}} zgodnie z kryteriami wielkości ACR TI-RADS.
  clinicalNotes:
    - Do wariantu łagodnego zaliczaj przede wszystkim guzki torbielowate, spongiformne lub z artefaktem comet-tail bez cech wysokiego ryzyka.
    - Nie opisuj pseudoguzków zapalnych jako rzeczywistych guzków, jeśli obraz bardziej odpowiada zmianom w przebiegu zapalenia tarczycy.
  differential:
    - Pseudoguzek zapalny w przebiegu Hashimoto.
    - Drobna torbiel koloidowa.
  followUp:
    - "TR2: bez BAC i zwykle bez planowej kontroli z samego powodu obrazu."
    - "TR3: kontrola od 1,5 cm, BAC od 2,5 cm."
