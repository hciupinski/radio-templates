sections:
  assessmentChecklist:
    - Wielkość obu płatów i cieśni.
    - Echogeniczność oraz jednorodność lub niejednorodność miąższu.
    - Rozlane wzmożenie unaczynienia w badaniu Doppler.
    - Obecność lub brak prawdziwych zmian ogniskowych wymagających osobnej klasyfikacji.
    - Cechy bardziej przemawiające za Gravesem niż za przewlekłym zapaleniem typu Hashimoto.
  reportTemplate: |
    Tarczyca {{niepowiekszona_lub_powiekszona_rozlanie}}, miąższ {{izo_lub_hipoechogeniczny}}, {{jednorodny_lub_niejednorodny_w_niewielkim_stopniu}}. W badaniu Doppler wyraźnie wzmożone, rozlane unaczynienie miąższu. Nie uwidoczniono dominującej zmiany ogniskowej wymagającej klasyfikacji TI-RADS.
  impressionTemplate: |
    Obraz USG może odpowiadać chorobie Gravesa-Basedowa, zwłaszcza przy współistniejącej nadczynności tarczycy. Do korelacji z TSH, fT4, fT3 oraz przeciwciałami przeciw receptorowi TSH.
  clinicalNotes:
    - Sam obraz USG nie zastępuje rozpoznania kliniczno-laboratoryjnego, ale rozlane wzmożenie przepływu może istotnie wspierać rozpoznanie Gravesa.
    - W odróżnieniu od Hashimoto dominują tu cechy hiperwaskularyzacji, bez przewagi włóknienia i pseudoguzków.
    - Jeśli współistnieje wyraźna zmiana ogniskowa, opisz ją osobno według ACR TI-RADS.
  differential:
    - Przewlekłe autoimmunologiczne zapalenie tarczycy typu Hashimoto.
    - Inne przyczyny tyreotoksykozy lub przejściowego zapalenia tarczycy.
  followUp:
    - Korelacja z obrazem klinicznym i wynikami hormonalnymi oraz przeciwciałami.
    - Dalsza kontrola obrazowa zależnie od przebiegu klinicznego lub współistnienia zmian ogniskowych.
