sections:
  assessmentChecklist:
    - Lokalizacja guzka.
    - Trzy wymiary.
    - "Skład: lity, torbielowaty, mieszany."
    - Echogeniczność.
    - "Kształt: szerszy niż wyższy lub wyższy niż szerszy."
    - Granice.
    - Ogniska echogeniczne i zwapnienia.
    - Kategoria ACR TI-RADS i próg biopsji lub kontroli.
  reportTemplate: |
    W {{lokalizacja}} widoczny guzek {{lity_mieszany_torbielowaty}} o wymiarach {{wymiary_mm}} mm, {{echogenicznosc}}, {{szerszy_niz_wyzszy_lub_wyzszy_niz_szerszy}}, o {{granice}} granicach, {{bez_lub_z}} ognisk echogenicznych/zwapnień. Klasyfikacja ACR TI-RADS: {{tirads}}.
  impressionTemplate: |
    Guzek tarczycy {{tirads}}. {{zalecenie_biopsja_lub_kontrola_lub_brak}} zgodnie z kryteriami wielkości i kategorią TI-RADS.
  clinicalNotes:
    - Nie klasyfikuj pseudoguzków zapalnych jako zmian ogniskowych, jeśli obraz temu nie odpowiada.
    - Punktację ACR TI-RADS wyliczaj osobno dla składu, echogeniczności, kształtu, granic i ognisk echogenicznych.
    - "Kategorie ACR TI-RADS odpowiadają sumie punktów: TR1 = 0, TR2 = 2, TR3 = 3, TR4 = 4-6, TR5 = 7 lub więcej."
  followUp:
    - "TR3: kontrola od 1,5 cm, BAC od 2,5 cm."
    - "TR4: kontrola od 1,0 cm, BAC od 1,5 cm."
    - "TR5: kontrola od 0,5 cm, BAC od 1,0 cm."
