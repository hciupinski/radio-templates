sections:
  assessmentChecklist:
    - Lokalizacja guzka.
    - Trzy wymiary.
    - "Skład: lity, torbielowaty, mieszany."
    - Echogeniczność.
    - "Kształt: szerszy niż wyższy lub wyższy niż szerszy."
    - Granice.
    - Ogniska echogeniczne i zwapnienia.
    - Kategoria ACR TI-RADS i próg biopsji lub kontroli.
