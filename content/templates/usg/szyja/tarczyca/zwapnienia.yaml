sections:
  assessmentChecklist:
    - Lokalizacja guzka i trzy wymiary.
    - "Typ ognisk echogenicznych: punktowe, makrozwapnienia, obwodowe lub z artefaktem comet-tail."
    - Obecność lub brak tylnego cienia akustycznego.
    - "Pozostałe cechy punktowane w ACR TI-RADS: skład, echogeniczność, kształt i granice."
    - Ostateczna kategoria TI-RADS oraz próg biopsji lub kontroli.
  reportTemplate: |
    W {{lokalizacja}} widoczny guzek o wymiarach {{wymiary_mm}} mm, {{sklad}}, {{echogenicznosc}}, o {{granicach}} granicach, {{szerszy_niz_wyzszy_lub_wyzszy_niz_szerszy}}, z {{punktowymi_ogniskami_echogenicznymi_lub_makrozwapnieniami_lub_zwapnieniem_obwodowym_lub_artefaktem_comet_tail}}. Klasyfikacja ACR TI-RADS: {{tirads}}.
  impressionTemplate: |
    Guzek tarczycy z ogniskami echogenicznymi / zwapnieniami. Znaczenie zmiany należy oceniać łącznie w ramach kategorii ACR TI-RADS, a nie na podstawie samych zwapnień.
  clinicalNotes:
    - Drobne punktowe ogniska echogeniczne bez artefaktu comet-tail zwiększają punktację TI-RADS jako punctate echogenic foci.
    - Makrozwapnienia i zwapnienia obwodowe należy odróżniać od łagodnych echogenicznych ognisk koloidowych z artefaktem comet-tail.
    - Zwapnienia nie stanowią samodzielnej jednostki chorobowej i powinny być raportowane jako cecha guzka.
  differential:
    - Łagodny guzek koloidowy z artefaktem comet-tail.
    - Guzek z makrozwapnieniami.
    - Zmiana podejrzana z punktowymi ogniskami echogenicznymi.
  followUp:
    - Zalecenia dotyczące BAC lub kontroli powinny wynikać z całkowitej kategorii TI-RADS i wielkości guzka.
