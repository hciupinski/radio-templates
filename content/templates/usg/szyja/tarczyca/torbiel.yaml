sections:
  assessmentChecklist:
    - Lokalizacja oraz liczba zmian torbielowatych.
    - Trzy wymiary największej zmiany.
    - Jednorodnie bezechowa lub z drobnymi echami koloidowymi treść.
    - Tylne wzmocnienie akustyczne.
    - Ściana zmiany i obecność składowej litej.
    - Ogniska echogeniczne, w tym artefakt comet-tail.
    - Klasyfikacja TI-RADS tylko wtedy, gdy zmiana nie jest prostą torbielą.
  reportTemplate: |
    W {{lokalizacja}} widoczna {{pojedyncza_lub_najwieksza}} zmiana torbielowata o wymiarach {{wymiary_mm}} mm, {{bezechowa_lub_z_drobnymi_echami_koloidowymi}}, z tylnym wzmocnieniem akustycznym, bez litej składowej i bez cech naciekania otoczenia. {{Z_lub_bez}} artefaktów comet-tail. Obraz odpowiada torbieli tarczycy / torbieli koloidowej.
  impressionTemplate: |
    Obraz USG odpowiada łagodnej zmianie torbielowatej tarczycy. Bez cech wysokiego ryzyka w dostępnym badaniu.
  clinicalNotes:
    - Prosta torbiel tarczycy nie wymaga punktacji ACR TI-RADS.
    - Jeśli obecna jest składowa lita lub nieregularne zgrubienia ściany, opisz zmianę jak guzek mieszany i sklasyfikuj według TI-RADS.
  differential:
    - Torbiel koloidowa.
    - Guzek mieszany z przewagą komponenty płynowej.
  followUp:
    - Kontrola lub ewentualna aspiracja tylko według objawów, wielkości zmiany i lokalnej praktyki klinicznej.
