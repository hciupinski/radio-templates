sections:
  assessmentChecklist:
    - Lokalizacja, trzy wymiary, kształt, orientacja i granice zmiany.
    - Echogeniczność, cechy tylne, zaburzenie architektury i skóra.
    - Unaczynienie w Dopplerze oraz ewentualne zmiany satelitarne.
    - Węzły pachowe i możliwość biopsji pod kontrolą USG.
    - Podkategoria BI-RADS 4A, 4B lub 4C, jeśli stosowana.
