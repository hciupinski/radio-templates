sections:
  assessmentChecklist:
    - Lokalizacja, trzy wymiary, kształt i obecność wnęki tłuszczowej.
    - Grubość i symetria kory oraz granice węzła.
    - Unaczynienie wnękowe lub obwodowe w Dopplerze.
    - Porównanie z badaniami wcześniejszymi oraz korelacja z obrazem piersi i pachy.
  reportTemplate: |
    W piersi {{strona}}, w kwadrancie {{kwadrant}}, widoczny owalny węzeł chłonny wewnątrzsutkowy o wymiarach {{wymiary_mm}} mm, z zachowaną echogeniczną wnęką tłuszczową i cienką, symetryczną korą. W Dopplerze unaczynienie o charakterze {{wnękowym_lub_brak}}. Bez cech atypii. BI-RADS 2.
  impressionTemplate: |
    Węzeł chłonny wewnątrzsutkowy o typowej morfologii łagodnej. BI-RADS 2.
  followUp:
    - Powiększenie, zatarcie wnęki tłuszczowej, asymetryczne pogrubienie kory lub unaczynienie obwodowe wymagają oceny w pełnym kontekście kliniczno-obrazowym.
