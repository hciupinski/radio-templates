sections:
  assessmentChecklist:
    - Miejsce dolegliwości, skóra i tkanka podskórna.
    - Obrzęk miąższu, poszerzenie przewodów oraz ewentualna zmiana ogniskowa.
    - Obecność kolekcji płynowej, jej zawartość i stosunek do skóry.
    - Unaczynienie miąższu, ścian kolekcji i ewentualnych elementów litych w Dopplerze.
    - Węzły chłonne pachowe po stronie objawowej.
  reportTemplate: |
    W piersi {{strona}}, w okolicy {{lokalizacja}}, widoczne pogrubienie skóry do {{grubosc_mm}} mm oraz obrzęk tkanki podskórnej i miąższu z niejednorodną echostrukturą. W Dopplerze wzmożone unaczynienie zapalnie zmienionego miąższu. {{brak_lub_opis_kolekcji_ropnej}}. W dole pachowym po stronie badanej {{opis_wezlow}}.
  impressionTemplate: |
    Obraz USG odpowiada zmianom zapalnym piersi {{strona}}. {{brak_lub_podejrzenie_ropnia}}.
  clinicalNotes:
    - W przypadku braku poprawy klinicznej lub atypowego obrazu konieczna jest dalsza diagnostyka w trybie odpowiednim do obrazu klinicznego.
