sections:
  assessmentChecklist:
    - Lokalizacja, trzy wymiary, kształt, orientacja i granice zmiany.
    - Cechy tylne, skóra, brodawka oraz ściana klatki piersiowej w dostępnym zakresie.
    - Unaczynienie, zmiany satelitarne i wieloogniskowość w Dopplerze.
    - Węzły pachowe po stronie zmiany.
    - Możliwość pilnej biopsji celowanej pod kontrolą USG.
