sections:
  assessmentChecklist:
    - Objawy z brodawki, zwłaszcza samoistny krwisty lub surowiczy wyciek.
    - Przewód, lokalizacja podbrodawkowa, trzy wymiary i morfologia zmiany.
    - Cechy torbielowate, poszerzenie przewodu oraz ewentualne zmiany dodatkowe.
    - Unaczynienie zmiany w Dopplerze.
    - Kategoria BI-RADS i możliwość biopsji celowanej obrazowo.
  reportTemplate: |
    W piersi {{strona}}, w okolicy {{lokalizacja}}, w poszerzonym przewodzie o średnicy {{srednica_przewodu_mm}} mm widoczna wewnątrzprzewodowa zmiana lita o wymiarach {{wymiary_mm}} mm, o {{opis_morfologii}}. W Dopplerze {{opis_unaczynienia}}. Obraz może odpowiadać zmianie brodawkowatej. BI-RADS {{kategoria}}.
  impressionTemplate: |
    Wewnątrzprzewodowa zmiana w piersi {{strona}}, podejrzana o brodawczaka wewnątrzprzewodowego. BI-RADS {{kategoria}}.
  followUp:
    - Dalsza kwalifikacja, w tym ewentualne pobranie materiału, zależnie od kategorii BI-RADS, objawów i zgodności kliniczno-obrazowej.
