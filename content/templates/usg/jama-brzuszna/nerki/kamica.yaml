sections:
  assessmentChecklist:
    - Lokalizacja złogu w obrębie kielicha, miedniczki lub połączenia miedniczkowo-moczowodowego.
    - Trzy wymiary lub największy wymiar złogu.
    - Obecność cienia akustycznego za złogiem.
    - Ewentualny artefakt twinkling w Dopplerze.
    - Obecność współistniejącego poszerzenia UKM lub moczowodu.
    - Porównanie z nerką przeciwną.
  reportTemplate: |
    W nerce {{strona}} / w rzucie {{lokalizacja}} widoczny hiperechogeniczny złóg o wielkości {{wymiar_mm}} mm, {{z_lub_bez}} wyraźnym cieniem akustycznym za zmianą. {{Obecne_lub_brak}} cechy zastoju w UKM. Nerka przeciwna {{bez_zmian_lub_opis}}.
  impressionTemplate: |
    Obraz USG odpowiada kamicy nerki {{strona}}. {{Obecne_lub_brak}} cech utrudnienia odpływu moczu w dostępnym badaniu.
  clinicalNotes:
    - Brak uwidocznienia złogu w USG nie wyklucza kamicy moczowodowej, zwłaszcza przy objawach kolki nerkowej.
    - W opisie odróżnij złóg bez zastoju od sytuacji współistniejącej z wodonerczem.
  differential:
    - Zwapniała zmiana w miąższu lub zatoce nerki.
    - Artefakt hiperechogeniczny bez jednoznacznego cienia akustycznego.
  followUp:
    - Przy utrzymujących się objawach i niejednoznacznym obrazie USG rozważyć dalszą diagnostykę zgodnie z kontekstem klinicznym.
