sections:
  assessmentChecklist:
    - Lokalizacja torbieli i największy wymiar zmiany.
    - Bezechowa zawartość i cienka, gładka ściana.
    - Brak przegród, zwapnień, guzków przyściennych i litej składowej.
    - Wzmocnienie akustyczne za tylną ścianą.
    - Wpływ zmiany na układ kielichowo-miedniczkowy lub zarys nerki.
  reportTemplate: |
    W nerce {{strona}}, w {{lokalizacja}}, widoczna jest torbiel o wymiarach {{mm_x_mm}}, bezechowa, cienkościenna, o gładkim zarysie, z wyraźnym wzmocnieniem za tylną ścianą. Nie uwidoczniono przegród, zwapnień, guzków przyściennych ani litej składowej.
  impressionTemplate: |
    Obraz odpowiada prostej torbieli nerki, zgodnej z łagodnym charakterem Bosniak I.
  clinicalNotes:
    - Typowa prosta torbiel nerkowa w USG nie wymaga dalszej charakterystyki obrazowej, jeśli pozostaje bezobjawowa i nie ma cech atypii.
  differential:
    - Torbiel okołomiedniczkowa.
    - Poszerzenie UKM imitujące zmianę torbielowatą.
