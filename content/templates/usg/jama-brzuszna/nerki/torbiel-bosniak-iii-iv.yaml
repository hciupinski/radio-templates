sections:
  assessmentChecklist:
    - Wielkość i lokalizacja złożonej zmiany torbielowatej.
    - Grubość i nieregularność ściany oraz przegród.
    - Obecność guzków przyściennych lub litej składowej.
    - Ewentualne unaczynienie podejrzanych elementów, jeśli widoczne.
    - Wpływ na zarys nerki, układ zbiorczy i otoczenie.
    - Obecność innych zmian ogniskowych lub cech rozsiewu w dostępnym zakresie badania.
  reportTemplate: |
    W nerce {{strona}}, w {{lokalizacja}}, widoczna jest złożona zmiana torbielowata o wymiarach {{mm_x_mm}}, z {{pogrubiala_lub_nieregularna}} ścianą i {{obecnymi_lub_brakiem}} pogrubiałymi przegrodami. {{Obecny_lub_brak}} guzek przyścienny / lita składowa. W badaniu Doppler / dostępnym zakresie oceny {{obecne_lub_brak}} cech unaczynienia podejrzanych elementów. Obraz budzi istotne podejrzenie torbielowatej zmiany wysokiego ryzyka.
  impressionTemplate: |
    Złożona torbielowata zmiana nerki podejrzana o kategorię Bosniak III-IV. Wymaga pilnej dalszej charakterystyki obrazowej i konsultacji urologicznej.
  clinicalNotes:
    - Sama morfologia w USG może wzbudzić istotne podejrzenie zmiany wysokiego ryzyka, ale pełna kwalifikacja Bosniak wymaga zwykle badania kontrastowego.
    - Obecność guzka przyściennego lub litej składowej istotnie zwiększa podejrzenie nowotworowego charakteru zmiany.
  differential:
    - Torbielowaty rak nerki.
    - Krwotoczna lub zapalna torbiel z wtórnym pogrubieniem ściany.
    - Inna złożona zmiana torbielowata wymagająca charakterystyki kontrastowej.
  followUp:
    - Wskazana pilna dalsza diagnostyka w CEUS, TK lub MR oraz decyzja wielodyscyplinarna zależnie od pełnego obrazu klinicznego.
