sections:
  assessmentChecklist:
    - Położenie i wielkość obu nerek.
    - Grubość kory i różnicowanie korowo-rdzeniowe.
    - Obecność zastoju w układzie kielichowo-miedniczkowym.
    - Obecność złogów, torbieli lub zmian ogniskowych.
  reportTemplate: |
    Nerka prawa o wymiarze długim {{prawa_mm}} mm, nerka lewa {{lewa_mm}} mm. Miąższ obu nerek prawidłowej grubości, z zachowanym różnicowaniem korowo-rdzeniowym. Bez cech zastoju w UKM. Nie uwidoczniono złogów ani zmian ogniskowych.
  impressionTemplate: |
    Obraz USG nerek w granicach normy.
  clinicalNotes:
    - Dla pełnego opisu uwzględnij pęcherz moczowy, jeśli był oceniany.
