sections:
  assessmentChecklist:
    - Wielkość trzustki oraz ewentualny zanik narządu.
    - Niejednorodność i wzrost echogeniczności miąższu.
    - Zwapnienia śródmiąższowe lub przewodowe.
    - Poszerzenie lub nieregularność przewodu Wirsunga.
    - Pseudotorbiele i wtórne poszerzenie dróg żółciowych.
    - Zmiana ogniskowa wymagająca różnicowania z nowotworem.
  reportTemplate: |
    Trzustka {{prawidlowej_wielkosci_lub_zanikowa}}, o {{niejednorodnej_zwiekszonej_echogenicznosci}} echostrukturze, z {{obecnymi_lub_brakiem}} zwapnień. Przewód Wirsunga {{nieposzerzony_lub_poszerzony_do_mm}}, {{gladki_lub_nieregularny}}. {{Obecne_lub_brak}} pseudotorbieli / wtórnego poszerzenia dróg żółciowych. Obraz przemawia za przewlekłymi zmianami zapalnymi.
  impressionTemplate: |
    Obraz USG odpowiada przewlekłemu zapaleniu trzustki w dostępnym zakresie. Do korelacji z wywiadem, objawami niewydolności zewnątrz- i wewnątrzwydzielniczej oraz wcześniejszymi badaniami.
  clinicalNotes:
    - We wczesnym przewlekłym zapaleniu trzustki obraz przezbrzuszny może być skąpy lub nieswoisty.
    - Ogniskowe poszerzenie przewodu lub asymetryczna masa wymagają ostrożnego różnicowania z nowotworem trzustki.
    - Warto opisać obecność złogów przewodowych i ewentualnych pseudotorbieli jako cech istotnych klinicznie.
  differential:
    - Rak trzustki z wtórnym poszerzeniem przewodu.
    - Stłuszczenie trzustki.
    - Zmiany pozapalne po przebytym ostrym zapaleniu.
  followUp:
    - Dalsza diagnostyka zależy od objawów, laboratoryjnych wykładników niewydolności trzustki oraz ewentualnej potrzeby badania przekrojowego lub EUS.
