sections:
  assessmentChecklist:
    - Widoczność głowy, trzonu i ogona trzustki.
    - Wielkość oraz zarys narządu.
    - Echogeniczność i jednorodność miąższu.
    - Szerokość przewodu Wirsunga.
    - Obecność zmian ogniskowych lub płynu okołotrzustkowego.
  reportTemplate: |
    Trzustka {{widoczna_w_calosci_lub_czesciowo_z_powodu_gazow_jelitowych}}, niepowiększona, o jednorodnej echostrukturze i {{prawidlowej_lub_nieznacznie_wiekszej_zaleznie_od_wieku}} echogeniczności. Przewód Wirsunga {{nieposzerzony_do_mm_lub_niewidoczny}}. Nie uwidoczniono zmian ogniskowych ani zbiorników płynowych okołotrzustkowo.
  impressionTemplate: |
    Obraz USG trzustki w granicach normy w dostępnym zakresie.
  clinicalNotes:
    - Przy ograniczonej ocenie z powodu gazów jelitowych zaznacz zakres widoczności narządu.
    - Echogeniczność trzustki może fizjologicznie wzrastać z wiekiem lub stłuszczeniem.
