sections:
  assessmentChecklist:
    - Umiarkowane wzmożenie echogeniczności miąższu.
    - Częściowe osłabienie widoczności naczyń i przepony.
    - Umiarkowane osłabienie penetracji w głębi.
    - Ograniczenia oceny zmian ogniskowych.
  reportTemplate: |
    Wątroba {{niepowiekszona_lub_powiekszona}}, o umiarkowanie wzmożonej echogeniczności miąższu, z umiarkowanym osłabieniem penetracji ultradźwięków. Widoczność przepony i naczyń wewnątrzwątrobowych częściowo ograniczona. Obraz odpowiada umiarkowanemu stłuszczeniu wątroby.
  impressionTemplate: |
    Półilościowe cechy umiarkowanego stłuszczenia wątroby w USG.
  clinicalNotes:
    - Ograniczona echogeniczność nie służy do samodzielnej oceny włóknienia.
