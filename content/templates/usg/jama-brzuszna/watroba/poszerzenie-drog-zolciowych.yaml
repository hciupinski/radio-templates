      - Przewód żółciowy wspólny jest wyraźnie poszerzony.
      - Poszerzenie widoczne jest w okolicy wnęki wątroby przy żyle wrotnej.
      - Średnica przewodu przekracza typowy zakres prawidłowy i wymaga korelacji z objawami oraz przeszkodą odpływu żółci.
