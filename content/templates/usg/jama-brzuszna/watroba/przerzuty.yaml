sections:
  assessmentChecklist:
    - Liczba zmian ogniskowych.
    - Rozmieszczenie segmentowe lub płatowe.
    - Wielkość największej zmiany oraz wymiary reprezentatywnych ognisk.
    - Echogeniczność, jednorodność i obecność obwódki.
    - Relacja do naczyń i dróg żółciowych.
    - Hepatomegalia i inne współistniejące odchylenia.
  reportTemplate: |
    W wątrobie widoczne {{pojedyncze_lub_liczne}} zmiany ogniskowe, rozmieszczone {{rozsianie_lub_segmentowo}}, największa o wymiarach {{wymiar_najwiekszej_zmiany_mm}} mm w segmencie {{segment}}. Zmiany {{hipoechogeniczne_hiperechogeniczne_lub_mieszane}}, {{jednorodne_lub_niejednorodne}}, {{bez_lub_z}} obwódką typu halo. Obraz budzi podejrzenie przerzutowego zajęcia wątroby.
  impressionTemplate: |
    Obraz mnogich lub pojedynczych zmian ogniskowych wątroby podejrzanych o przerzuty. Wymaga korelacji onkologicznej i dalszej charakterystyki.
  clinicalNotes:
    - Czułość konwencjonalnego USG dla drobnych lub izoechogenicznych przerzutów jest ograniczona.
  differential:
    - Mnogie naczyniaki lub inne wieloogniskowe zmiany łagodne.
    - HCC wieloogniskowy zależnie od tła klinicznego.
  followUp:
    - Dalsza diagnostyka przekrojowa zależnie od wskazań onkologicznych i dostępnych wcześniejszych badań.
