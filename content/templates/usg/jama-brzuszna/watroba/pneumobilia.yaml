    findings:
      - W miąższu wątroby widoczne są liczne liniowe hiperechogeniczne refleksy.
      - Za zmianami obecny jest artefakt reverberacyjny typu dirty shadowing.
      - Rozmieszczenie zmian jest rozproszone w przebiegu dróg żółciowych, a nie obwodowo jak przy gazie w układzie wrotnym.
