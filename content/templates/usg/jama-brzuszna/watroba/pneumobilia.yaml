sections:
  assessmentChecklist:
    - Lokalizacja hiperechogenicznych refleksów w przebiegu dróg żółciowych.
    - Obecność artefaktów reverberacyjnych lub typu dirty shadowing.
    - Stan dróg żółciowych i ich ewentualne poszerzenie.
    - Wywiad po zabiegach na drogach żółciowych lub po ERCP.
    - Różnicowanie z gazem w żyle wrotnej.
  reportTemplate: |
    W obrębie dróg żółciowych wewnątrzwątrobowych widoczne liczne hiperechogeniczne refleksy z artefaktami reverberacyjnymi, odpowiadające obecności gazu w drogach żółciowych. {{Brak_lub_obecnosc}} poszerzenia dróg żółciowych. Obraz należy interpretować w korelacji z wywiadem zabiegowym i klinicznym.
  impressionTemplate: |
    Cechy pneumobilia. Znaczenie kliniczne zależne od wywiadu zabiegowego i obrazu klinicznego.
  clinicalNotes:
    - W razie nietypowego obrazu lub ciężkiego stanu klinicznego należy odróżnić pneumobilia od gazu w układzie żyły wrotnej.
  differential:
    - Gaz w układzie żyły wrotnej.
  followUp:
    - Korelacja z wywiadem po zabiegach dróg żółciowych, ERCP lub z podejrzeniem przetoki żółciowo-jelitowej bądź infekcji.
