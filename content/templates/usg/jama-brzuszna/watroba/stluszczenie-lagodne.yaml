sections:
  assessmentChecklist:
    - Niewielkie wzmożenie echogeniczności miąższu.
    - Zachowana widoczność przepony i naczyń wewnątrzwątrobowych.
    - Penetracja ultradźwięków w głębszych partiach miąższu.
    - Ograniczenia oceny zmian ogniskowych.
  reportTemplate: |
    Wątroba {{niepowiekszona_lub_powiekszona}}, o nieznacznie wzmożonej echogeniczności miąższu. Widoczność przepony i naczyń wewnątrzwątrobowych zachowana, bez istotnego osłabienia penetracji. Obraz odpowiada łagodnemu stłuszczeniu wątroby.
  impressionTemplate: |
    Półilościowe cechy łagodnego stłuszczenia wątroby w USG.
  clinicalNotes:
    - Ocena w USG nie stanowi histologicznego stopniowania stłuszczenia.
