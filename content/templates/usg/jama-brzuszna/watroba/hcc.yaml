sections:
  assessmentChecklist:
    - Tło wątroby i obecność marskości lub przewlekłej choroby wątroby.
    - Lokalizacja zmiany i segment.
    - Trzy wymiary zmiany.
    - Echostruktura, odgraniczenie i liczba ognisk.
    - Naciekanie naczyń lub zakrzepica nowotworowa, jeśli podejrzewane.
    - Obecność wodobrzusza i innych cech zaawansowania choroby.
  reportTemplate: |
    W segmencie {{segment}} wątroby, na tle {{marskiej_lub_inaczej_zmienionej_lub_niezmienionej}} wątroby, widoczna zmiana ogniskowa o wymiarach {{wymiary_mm}} mm, {{echostruktura}}, o {{granicach}} granicach, {{pojedyncza_lub_mnogie}}. {{Brak_lub_podejrzenie}} naciekania naczyniowego w dostępnym zakresie badania. Obraz budzi podejrzenie HCC, jednak wymaga dalszej charakterystyki zgodnie z obowiązującymi zaleceniami.
  impressionTemplate: |
    Zmiana ogniskowa wątroby podejrzana o HCC. Wskazana dalsza charakterystyka w dedykowanym badaniu kontrastowym.
  clinicalNotes:
    - USG może wykryć zmianę podejrzaną, ale zwykle nie pozwala na rozstrzygające rozpoznanie HCC bez dalszego badania kontrastowego.
  differential:
    - Regeneracyjny lub dysplastyczny guzek w marskości.
    - Przerzut.
    - Inna pierwotna lub wtórna zmiana złośliwa wątroby.
  followUp:
    - Pilna korelacja hepatologiczna lub onkologiczna oraz dalsza diagnostyka zgodnie z aktualnymi zaleceniami.
