    findings:
      - Widoczna jest pojedyncza, dobrze odgraniczona zmiana ogniskowa.
      - Zmiana jest wyraźnie hipoechogeniczna względem otaczającego miąższu.
      - W centrum obecna jest niejednorodność sugerująca złożoną architekturę zmiany.
