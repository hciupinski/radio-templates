sections:
  assessmentChecklist:
    - Lokalizacja zmiany i segment wątroby.
    - Trzy wymiary zmiany.
    - Echogeniczność i jednorodność.
    - Obecność cech krwawienia, martwicy lub otoczki.
    - Unaczynienie w badaniu Doppler.
    - Liczba zmian oraz tło miąższu.
    - Istotne dane kliniczne zwiększające prawdopodobieństwo rozpoznania.
  reportTemplate: |
    W segmencie {{segment}} wątroby widoczna zmiana ogniskowa o wymiarach {{wymiary_mm}} mm, {{echogenicznosc}}, {{jednorodna_lub_niejednorodna}}, z {{brakiem_lub_obecnoscia}} cech krwawienia, martwicy albo komponentów atypowych. W badaniu Doppler {{brak_lub_obecnosc}} przepływu. Obraz jest nieswoisty; w odpowiednim kontekście klinicznym należy brać pod uwagę gruczolaka.
  impressionTemplate: |
    Nieswoista zmiana ogniskowa wątroby; w różnicowaniu należy uwzględnić gruczolaka. Wymaga dalszej charakterystyki obrazowej.
  clinicalNotes:
    - Rozpoznanie gruczolaka nie powinno być stawiane kategorycznie wyłącznie na podstawie konwencjonalnego USG.
  differential:
    - FNH.
    - Naczyniak atypowy.
    - HCC lub inna zmiana nowotworowa.
  followUp:
    - Dalsza charakterystyka w badaniu kontrastowym i korelacja z danymi klinicznymi.
