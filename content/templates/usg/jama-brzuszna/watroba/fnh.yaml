    sourceId: intechopen-liver-tumors-2012
    caption: Szaroskala wykrywa zmianę, a CEUS pokazuje centralne wypełnianie i promienisty wzorzec charakterystyczny dla FNH.
    alt: Zestawienie obrazu szaroskali i CEUS w ogniskowym rozroście guzkowym wątroby.
    category: variant
    findings:
      - Zmiana jest uchwytna już w obrazie szaroskali.
      - W CEUS widoczne jest centralne wypełnianie kontrastem.
      - Wzorzec wzmocnienia promienistego wspiera rozpoznanie FNH.
