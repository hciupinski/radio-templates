sections:
  assessmentChecklist:
    - Lokalizacja zmiany i segment wątroby.
    - Trzy wymiary zmiany.
    - Echogeniczność względem otaczającego miąższu.
    - Odgraniczenie zmiany i jednorodność.
    - Obecność centralnej blizny lub promienistego układu naczyń, jeśli widoczne.
    - Unaczynienie w badaniu Doppler.
    - Tło wątroby i obecność innych zmian ogniskowych.
  reportTemplate: |
    W segmencie {{segment}} wątroby widoczna {{dobrze_lub_slabiej}} odgraniczona zmiana ogniskowa o wymiarach {{wymiary_mm}} mm, {{izoechogeniczna_lub_inna}}, {{jednorodna_lub_niejednorodna}}, z {{brakiem_lub_obecnoscia}} cech centralnej blizny lub charakterystycznego unaczynienia w badaniu Doppler. Obraz może odpowiadać FNH, jednak nie jest jednoznacznie swoisty w ultrasonografii konwencjonalnej.
  impressionTemplate: |
    Zmiana ogniskowa wątroby o obrazie mogącym odpowiadać FNH. W razie braku wcześniejszej charakterystyki rozważyć dalszą ocenę obrazową.
  clinicalNotes:
    - Samo USG B-mode zwykle nie wystarcza do pewnego rozpoznania FNH.
  differential:
    - Naczyniak atypowy.
    - Gruczolak.
    - Inna zmiana ogniskowa wymagająca dalszej charakterystyki.
  followUp:
    - Rozważyć dalszą charakterystykę w badaniu kontrastowym zależnie od obrazu klinicznego i wcześniejszych badań.
