sections:
  assessmentChecklist:
    - Stopień wypełnienia pęcherzyka.
    - Grubość ściany.
    - Obecność złogów, błota żółciowego lub polipów.
    - Drogi żółciowe zewnątrzwątrobowe.
  reportTemplate: |
    Pęcherzyk żółciowy prawidłowo wypełniony, cienkościenny, bez złogów i bez zmian przyściennych. Droga żółciowa wspólna nieposzerzona, o średnicy {{pzw_mm}} mm.
  impressionTemplate: |
    Obraz USG pęcherzyka żółciowego w granicach normy.
  clinicalNotes:
    - Gdy pacjent nie jest na czczo, odnotuj ograniczoną ocenę pęcherzyka.
