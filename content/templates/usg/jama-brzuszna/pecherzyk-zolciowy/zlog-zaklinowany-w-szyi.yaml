sections:
  assessmentChecklist:
    - Lokalizacja złogu w szyi pęcherzyka lub w zachyłku Hartmanna.
    - Brak lub ograniczenie ruchomości złogu przy zmianie pozycji ciała.
    - Obecność cienia akustycznego za złogiem.
    - Wymiary pęcherzyka oraz grubość jego ściany.
    - Objaw sonograficzny Murphy'ego.
    - Obecność płynu okołopęcherzykowego.
    - Szerokość dróg żółciowych zewnątrzwątrobowych.
  reportTemplate: |
    W szyi pęcherzyka żółciowego / w zachyłku Hartmanna widoczny złóg o wymiarze do {{wymiar_mm}} mm, nieruchomy przy zmianie pozycji ciała, z cieniem akustycznym. Pęcherzyk żółciowy {{powiekszony_lub_niepowiekszony}}. Ściana pęcherzyka {{niepogrubiala_lub_pogrubiala_do_mm}}. Objaw sonograficzny Murphy'ego {{ujemny_lub_dodatni}}. {{Brak_lub_obecnosc}} płynu okołopęcherzykowego. Droga żółciowa wspólna {{nieposzerzona_lub_poszerzona_do_mm}}.
  impressionTemplate: |
    Złóg zaklinowany w szyi pęcherzyka żółciowego. {{Brak_jednoznacznych_lub_obecne}} sonograficznych cech ostrego zapalenia pęcherzyka.
  clinicalNotes:
    - Samo zaklinowanie złogu w szyi zwiększa ryzyko ostrego zapalenia, ale rozpoznanie zapalenia wymaga korelacji obrazu USG z objawami i badaniami laboratoryjnymi.
    - Przy dodatnim objawie Murphy'ego, pogrubieniu ściany lub płynie okołopęcherzykowym wnioski należy formułować w kierunku ostrego zapalenia.
  differential:
    - Złogi ruchome bez cech zaklinowania.
    - Ostre zapalenie pęcherzyka żółciowego.
  followUp:
    - W przypadku współistnienia cech zapalenia wskazana pilna korelacja kliniczno-laboratoryjna i dalsze postępowanie chirurgiczne zgodnie ze stanem pacjenta.
