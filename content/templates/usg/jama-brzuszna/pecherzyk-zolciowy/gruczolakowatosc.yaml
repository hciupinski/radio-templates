sections:
  assessmentChecklist:
    - Lokalizacja i zasięg pogrubienia ściany pęcherzyka.
    - Obecność zatok Rokitansky'ego-Aschoffa lub drobnych przestrzeni śródściennych.
    - Obecność artefaktu comet-tail lub ring-down.
    - Czy zmiana ma charakter ogniskowy, segmentalny czy rozlany.
    - Współistnienie złogów, cech zapalenia i płynu okołopęcherzykowego.
    - Cechy litej masy, przerwania ciągłości ściany lub naciekania poza pęcherzyk.
  reportTemplate: |
    Ściana pęcherzyka żółciowego {{odcinkowo_lub_rozlanie}} pogrubiała do {{grubosc_sciany_mm}} mm, najbardziej w obrębie {{lokalizacja}}, z obecnością {{zatok_rokitanskyego_aschoffa_lub_srodsciennych_echogenicznych_ognisk}} oraz {{obecnym_lub_nieobecnym}} artefaktem comet-tail. W dostępnym zakresie badania nie uwidoczniono jednoznacznej litej masy naciekającej poza ścianę pęcherzyka. {{Brak_lub_obecnosc}} współistniejących złogów. {{Brak_lub_obecnosc}} płynu okołopęcherzykowego.
  impressionTemplate: |
    Obraz najbardziej odpowiada gruczolakowatości pęcherzyka żółciowego. {{Brak_lub_obecnosc}} cech wymagających dalszej charakterystyki.
  clinicalNotes:
    - Obecność typowych zatok Rokitansky'ego-Aschoffa i artefaktu comet-tail przemawia za łagodnym charakterem zmiany.
    - Przy braku typowych artefaktów, asymetrycznym pogrubieniu ściany lub podejrzeniu litej składowej należy ostrożniej różnicować zmianę z nowotworem pęcherzyka.
  differential:
    - Ogniskowe przewlekłe zapalenie pęcherzyka.
    - Polip przyścienny lub cholesterolosis.
    - Rak pęcherzyka żółciowego przy nieregularnym pogrubieniu ściany i utracie jej ciągłości.
  followUp:
    - W obrazie atypowym lub niejednoznacznym rozważyć dalszą charakterystykę, najlepiej metodą przekrojową lub kontrastowym USG zgodnie z dostępnością i kontekstem klinicznym.
