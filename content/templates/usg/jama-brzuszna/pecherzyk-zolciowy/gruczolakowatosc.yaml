    caption: Ogniskowe pogrubienie ściany dna pęcherzyka z echogenicznymi ogniskami śródściennymi; na panelach CEUS ściana pozostaje ciągła.
    alt: Obraz USG i CEUS gruczolakowatości pęcherzyka żółciowego z pogrubieniem ściany i zatokami Rokitansky'ego-Aschoffa.
    category: typical
    findings:
      - Ściana dna pęcherzyka jest ogniskowo pogrubiała.
      - Widoczne są śródścienne echogeniczne ogniska odpowiadające zatokom Rokitansky'ego-Aschoffa.
      - W badaniu kontrastowym ciągłość ściany jest zachowana.
      - Anechogeniczne przestrzenie śródścienne stają się wyraźniejsze w późniejszej fazie.
