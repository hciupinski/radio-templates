sections:
  assessmentChecklist:
    - Obecność drobnoechowej lub niskoechogenicznej treści w świetle pęcherzyka.
    - Warstwowanie się treści i jej zachowanie przy zmianie pozycji ciała, jeśli oceniane.
    - Obecność lub brak tylnego cienia akustycznego.
    - Współistnienie złogów.
    - Grubość ściany pęcherzyka i objaw sonograficzny Murphy'ego.
    - Płyn okołopęcherzykowy oraz szerokość dróg żółciowych.
  reportTemplate: |
    W świetle pęcherzyka żółciowego widoczna {{drobnoechowa_lub_niskoechogeniczna}} treść, {{warstwujaca_sie_lub_niewarstwuajaca_sie}}, bez wyraźnego tylnego cienia akustycznego, odpowiadająca błotu żółciowemu. {{Brak_lub_obecnosc}} współistniejących złogów. Ściana pęcherzyka {{niepogrubiala_lub_pogrubiala_do_mm}}. {{Brak_lub_obecnosc}} płynu okołopęcherzykowego. Droga żółciowa wspólna {{nieposzerzona_lub_poszerzona_do_mm}}.
  impressionTemplate: |
    Obraz odpowiada błotu żółciowemu w pęcherzyku żółciowym. {{Brak_lub_obecnosc}} sonograficznych cech ostrego zapalenia.
  clinicalNotes:
    - Błoto żółciowe może ustępować, nawracać lub progresować do kamicy.
    - Przy współistnieniu pogrubienia ściany, dodatniego objawu Murphy'ego lub płynu okołopęcherzykowego należy brać pod uwagę zapalenie pęcherzyka.
  differential:
    - Drobne złogi bez pełnego cienia akustycznego.
    - Krwista lub ropna treść pęcherzyka.
    - Zalegająca żółć o zwiększonej gęstości.
  followUp:
    - U pacjentów bezobjawowych zwykle wystarcza korelacja kliniczna; przy objawach lub powikłaniach rozważyć dalsze postępowanie jak w chorobie pęcherzyka żółciowego.
