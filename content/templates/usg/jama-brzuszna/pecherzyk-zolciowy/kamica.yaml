    imageUrl: "https://upload.wikimedia.org/wikipedia/commons/3/3d/Ultrasonography_of_sludge_and_gallstones%2C_annotated.jpg"
    thumbnailUrl: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Ultrasonography_of_sludge_and_gallstones%2C_annotated.jpg/330px-Ultrasonography_of_sludge_and_gallstones%2C_annotated.jpg"
