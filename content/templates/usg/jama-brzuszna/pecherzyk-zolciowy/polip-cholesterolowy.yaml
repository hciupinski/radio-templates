sections:
  assessmentChecklist:
    - Liczba zmian przyściennych oraz ich maksymalny wymiar.
    - Lokalizacja względem ściany pęcherzyka.
    - Uszypułowanie lub szeroka podstawa.
    - Brak lub obecność tylnego cienia akustycznego.
    - Zachowanie zmiany przy zmianie pozycji ciała, jeśli oceniane.
    - Grubość ściany pęcherzyka, współistnienie kamicy i szerokość dróg żółciowych.
  reportTemplate: |
    W świetle pęcherzyka żółciowego, przy ścianie {{lokalizacja_sciany}}, widoczna {{pojedyncza_lub_liczne}} drobna zmiana przyścienna do {{wymiar_mm}} mm, {{uszypulowana_lub_szerokopodstawna}}, bez wyraźnego tylnego cienia akustycznego i bez cech ruchomości w dostępnym zakresie oceny, o obrazie najbardziej odpowiadającym polipowi cholesterolowemu. Ściana pęcherzyka {{niepogrubiala_lub_pogrubiala_do_mm}}. {{Brak_lub_obecnosc}} współistniejących złogów. Droga żółciowa wspólna {{nieposzerzona_lub_poszerzona_do_mm}}.
  impressionTemplate: |
    Drobna zmiana przyścienna pęcherzyka żółciowego o obrazie najbardziej odpowiadającym polipowi cholesterolowemu. {{Brak_lub_obecnosc}} sonograficznych cech alarmowych.
  clinicalNotes:
    - Za łagodnym charakterem przemawia mały wymiar, jednorodny obraz przyścienny, brak cienia akustycznego i brak cech naciekania ściany.
    - Jeśli zmiana jest większa, szerokopodstawna, nieregularna lub narasta w obserwacji, należy użyć ostrożniejszego sformułowania i rozważyć wariant szablonu dla polipa wymagającego kontroli.
  differential:
    - Drobny złóg przyścienny przy niepełnej ocenie ruchomości.
    - Ogniskowa gruczolakowatość pęcherzyka.
    - Polip gruczolakowy lub inna zmiana nabłonkowa przy obrazie nietypowym.
