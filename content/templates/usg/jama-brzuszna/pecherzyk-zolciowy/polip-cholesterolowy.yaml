    category: typical
    findings:
      - Widoczne są drobne przyścienne wypustki do około 3-7 mm.
      - Zmiany przylegają do ściany pęcherzyka i nie dają typowego tylnego cienia akustycznego.
      - Obraz bardziej odpowiada polipom niż ruchomym złogom.
