    alt: Obraz USG pęcherzyka żółciowego z drobnymi przyściennymi polipami.
    category: typical
    findings:
      - Widoczne są drobne przyścienne wypustki do około 3-7 mm.
      - Zmiany przylegają do ściany i nie dają typowego tylnego cienia akustycznego.
      - Obraz odpowiada polipom, a nie ruchomym złogom.
