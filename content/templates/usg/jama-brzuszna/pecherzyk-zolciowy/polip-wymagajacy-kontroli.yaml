sections:
  assessmentChecklist:
    - Liczba zmian przyściennych i maksymalny wymiar największej z nich.
    - Uszypułowanie lub szeroka podstawa zmiany.
    - Lokalizacja w obrębie ściany pęcherzyka.
    - Ogniskowe pogrubienie ściany powyżej 4 mm, jeśli obecne.
    - Brak lub obecność tylnego cienia akustycznego oraz ocena ruchomości.
    - Współistnienie kamicy, objawów klinicznych i istotnych czynników ryzyka z wywiadu.
  reportTemplate: |
    W świetle pęcherzyka żółciowego, przy ścianie {{lokalizacja_sciany}}, widoczna {{pojedyncza_lub_liczne}} zmiana przyścienna do {{wymiar_mm}} mm, {{uszypulowana_lub_szerokopodstawna}}, bez cech ruchomości w dostępnym zakresie oceny. {{Brak_lub_obecnosc}} wyraźnego tylnego cienia akustycznego. Ściana pęcherzyka {{niepogrubiala_lub_ogniskowo_pogrubiala_do_mm}}. {{Brak_lub_obecnosc}} współistniejących złogów. Droga żółciowa wspólna {{nieposzerzona_lub_poszerzona_do_mm}}.
  impressionTemplate: |
    Zmiana przyścienna pęcherzyka żółciowego o obrazie polipa wymagającego kontroli. Dalsze postępowanie zależne od wymiaru zmiany i obecności czynników ryzyka klinicznego.
  clinicalNotes:
    - Zmiany z artefaktem comet-tail częściej odpowiadają pseudo-polipom i nie powinny być automatycznie prowadzone według algorytmu dla prawdziwych polipów.
    - Przy wielkości 10 mm lub większej albo przy wzroście zmiany należy unikać bagatelizującego sformułowania i opisać wskazania do dalszej kwalifikacji.
  differential:
    - Polip cholesterolowy o małym ryzyku.
    - Ogniskowa gruczolakowatość pęcherzyka.
    - Drobny złóg przyścienny przy niepełnej ocenie ruchomości.
  followUp:
    - Jeśli polip ma 6-9 mm i brak istotnych czynników ryzyka, zalecana kontrola USG po 6 miesiącach, po 1 roku i po 2 latach.
    - Jeśli polip ma 5 mm lub mniej, ale współistnieją czynniki ryzyka złośliwości, zalecana kontrola USG po 6 miesiącach, po 1 roku i po 2 latach.
    - Jeśli zmiana osiąga 10 mm lub rośnie o 2 mm albo więcej w obserwacji, należy rozważyć kwalifikację chirurgiczną zgodnie z kontekstem klinicznym.
