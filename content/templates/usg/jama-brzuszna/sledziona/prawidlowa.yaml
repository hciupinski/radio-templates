sections:
  assessmentChecklist:
    - Pełna widoczność śledziony oraz ewentualne ograniczenia techniczne.
    - Długość i grubość śledziony w ustalonych przekrojach.
    - Zarys narządu i jednorodność miąższu.
    - Obecność zmian ogniskowych, płynu okołośledzionowego lub cech urazu.
    - Wnęka śledziony i widoczne naczynia, jeżeli są oceniane.
    - Obecność śledzion dodatkowych, jeśli są widoczne.
  reportTemplate: |
    Śledziona niepowiększona, o długości {{dlugosc_mm}} mm i grubości {{grubosc_mm}} mm, o gładkim zarysie oraz jednorodnej echostrukturze. Nie uwidoczniono zmian ogniskowych ani płynu okołośledzionowego. Wnęka śledziony {{bez_istotnych_odchylen_lub_opis}}.
  impressionTemplate: |
    Obraz USG śledziony w granicach normy.
  clinicalNotes:
    - Interpretuj wymiary z uwzględnieniem budowy ciała, wieku i techniki pomiaru; pojedynczy wymiar nie zastępuje korelacji klinicznej.
    - Przy niepełnej widoczności narządu zaznacz ograniczenie badania.
